<!DOCTYPE html>
<html lang="en" data-lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Young Sporting Club</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* Basic Styles for UI */
        :root { --pk: #FE2C55; --bg: #010101; --txt: #FFFFFF; }
        body { background: var(--bg); color: var(--txt); font-family: 'Poppins', sans-serif; margin: 0; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .twrap { overflow-x: auto; background: #111; border-radius: 12px; padding: 10px; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #222; cursor: pointer; }
        th { background: #1a1a1a; color: var(--pk); }
        tr:hover { background: #1a1a1a; }
        .pbdg { padding: 4px 10px; border-radius: 50px; font-size: 12px; font-weight: bold; background: rgba(254,44,85,0.1); color: var(--pk); border: 1px solid var(--pk); }
        .member-avatar img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; margin-right: 10px; vertical-align: middle; }
        .btn { padding: 10px 20px; border-radius: 8px; text-decoration: none; display: inline-block; font-weight: bold; transition: 0.3s; }
        .btn-pk { background: var(--pk); color: #fff; }
        .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        input, select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; }
        /* Toast & Modal */
        #toast { position: fixed; bottom: 20px; right: 20px; background: #333; padding: 15px 25px; border-radius: 8px; display: none; z-index: 1000; border-left: 5px solid var(--pk); }
        #toast.show { display: block; animation: fadeIn 0.5s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        footer { margin-top: 50px; padding: 30px 0; border-top: 1px solid #222; text-align: center; }
        .gold-letter { color: #FFD700; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <header id="hdr">
        <h1 id="clubNameHeader" data-en="Young Sporting Club" data-bn="ইয়ং স্পোর্টিং ক্লাব">Young Sporting Club</h1>
        <div class="controls">
            <button class="btn btn-pk" onclick="setLang('en')">EN</button>
            <button class="btn btn-pk" onclick="setLang('bn')">বাং</button>
            <input type="text" id="searchInput" placeholder="Search by name or address...">
            <select id="posFilter">
                <option value="all" data-en="All Positions" data-bn="সব পদ">All Positions</option>
            </select>
            <button class="btn" style="background: #25F4EE; color: #000;" onclick="exportToPDF()"><i class="fas fa-file-pdf"></i> PDF</button>
            <button class="btn" style="background: #fff; color: #000;" onclick="exportToCSV()"><i class="fas fa-file-csv"></i> CSV</button>
        </div>
    </header>

    <div id="mCount" style="margin-bottom: 10px; color: #888;"></div>

    <div class="twrap" data-aos="fade-up">
        <table>
            <thead>
                <tr>
                    <th data-en="Member" data-bn="সদস্য">Member</th>
                    <th data-en="Position" data-bn="পদ">Position</th>
                    <th data-en="Address" data-bn="ঠিকানা">Address</th>
                    <th data-en="Joined" data-bn="যোগদান">Joined</th>
                </tr>
            </thead>
            <tbody id="mBody">
                <tr><td colspan="4" style="text-align:center;padding:60px 20px;">Loading members...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="tc" style="margin-top:38px; text-align: center;" data-aos="fade-up">
        <a href="add_member.html" class="btn btn-pk"><i class="fas fa-user-plus"></i> <span data-en="Add New Member" data-bn="নতুন সদস্য যোগ করুন">Add New Member</span></a>
    </div>
</div>

<footer>
    <div class="container">
        <p id="clubNameFooter">© 2026 Young Sporting Club. All rights reserved.</p>
        <div class="dev" style="cursor: pointer;" onclick="window.location.href='developer.html'">
            <span id="developerName">Developed by Farabi Walid</span>
        </div>
    </div>
</footer>

<div id="toast"><span id="toastMsg"></span></div>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyD5QAGS-36neDTskPpEQjY835seWFCEq9o",
    authDomain: "youngsportingclub.firebaseapp.com",
    databaseURL: "https://youngsportingclub-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "youngsportingclub",
    storageBucket: "youngsportingclub.firebasestorage.app",
    messagingSenderId: "724732761340",
    appId: "1:724732761340:web:dc664c10d55d5bb87cb379"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const positionOrder = {
    'President': 1, 'Senior Vice President': 2, 'Vice President 1': 3,
    'Vice President 2': 4, 'Vice President 3': 5, 'General Secretary': 6,
    'Joint General Secretary': 7, 'Assistant General Secretary': 8,
    'Organizing Secretary': 9, 'Assistant Organizing Secretary': 10,
    'Treasurer': 11, 'Assistant Treasurer': 12, 'Office Secretary': 13,
    'Assistant Office Secretary': 14, 'Sports Secretary': 15,
    'Assistant Sports Secretary': 16, 'Publicity Secretary': 17,
    'Assistant Publicity Secretary': 18, 'Social Welfare Secretary': 19,
    'Education Secretary': 20, 'Culture Secretary': 21, 'Training Secretary': 22,
    'Science Secretary': 23, 'Disaster Secretary': 24, 'Liberation Secretary': 25,
    'International Secretary': 26, 'Religious Secretary': 27, 'Member': 28
};

const positionTranslation = {
    'President': 'সভাপতি', 'Senior Vice President': 'সিনিয়র সহ-সভাপতি',
    'Vice President 1': 'সহ-সভাপতি-১', 'Vice President 2': 'সহ-সভাপতি-২',
    'Vice President 3': 'সহ-সভাপতি-৩', 'General Secretary': 'সাধারণ সম্পাদক',
    'Joint General Secretary': 'যুগ্ম-সাধারণ সম্পাদক', 'Assistant General Secretary': 'সহ-সাধারণ সম্পাদক',
    'Organizing Secretary': 'সাংগঠনিক সম্পাদক', 'Assistant Organizing Secretary': 'সহ-সাংগঠনিক সম্পাদক',
    'Treasurer': 'অর্থ সম্পাদক', 'Assistant Treasurer': 'সহ-অর্থ সম্পাদক',
    'Office Secretary': 'দপ্তর সম্পাদক', 'Assistant Office Secretary': 'সহ-দপ্তর সম্পাদক',
    'Sports Secretary': 'ক্রীড়া সম্পাদক', 'Assistant Sports Secretary': 'সহ-ক্রীড়া সম্পাদক',
    'Publicity Secretary': 'প্রচার সম্পাদক', 'Assistant Publicity Secretary': 'সহ-প্রচার সম্পাদক',
    'Social Welfare Secretary': 'সমাজকল্যাণ সম্পাদক', 'Education Secretary': 'শিক্ষা সম্পাদক',
    'Culture Secretary': 'সাহিত্য ও সংস্কৃতি সম্পাদক', 'Training Secretary': 'প্রশিক্ষণ সম্পাদক',
    'Science Secretary': 'বিজ্ঞান ও প্রযুক্তি সম্পাদক', 'Disaster Secretary': 'ত্রাণ ও দুর্যোগ সম্পাদক',
    'Liberation Secretary': 'মুক্তিযুদ্ধ সম্পাদক', 'International Secretary': 'আন্তর্জাতিক সম্পাদক',
    'Religious Secretary': 'ধর্ম সম্পাদক', 'Member': 'সদস্য'
};

const langData = {
    en: { clubNameHeader: 'YOUNG SPORTING CLUB', devName: "Developed by Farabi Walid", estDate: "Est. 13 Jan 2009" },
    bn: { clubNameHeader: 'ইয়ং স্পোর্টিং ক্লাব', devName: "তৈরি করেছেন ফারাবি ওয়ালিদ", estDate: "প্রতিষ্ঠা: ১৩ জানুয়ারি ২০০৯" }
};

let allMembers = [];
const tbody = document.getElementById('mBody');
const filterEl = document.getElementById('posFilter');
const clubLogoUrl = window.location.origin + '/ysc.png';

async function loadMembers() {
    try {
        const querySnapshot = await getDocs(collection(db, 'members'));
        allMembers = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        setupFilters();
        renderMembers(allMembers);
    } catch (e) {
        tbody.innerHTML = "<tr><td colspan='4'>Error loading data.</td></tr>";
    }
}

function setupFilters() {
    const lang = document.documentElement.getAttribute('data-lang') || 'en';
    const firstOption = filterEl.options[0];
    filterEl.innerHTML = '';
    filterEl.appendChild(firstOption);
    Object.keys(positionOrder).forEach(pos => {
        const opt = document.createElement('option');
        opt.value = pos;
        opt.textContent = lang === 'bn' ? (positionTranslation[pos] || pos) : pos;
        filterEl.appendChild(opt);
    });
}

function renderMembers(members) {
    const lang = document.documentElement.getAttribute('data-lang') || 'en';
    const sorted = [...members].sort((a, b) => (positionOrder[a.position] || 99) - (positionOrder[b.position] || 99));

    if (sorted.length === 0) {
        tbody.innerHTML = `<tr><td colspan="4" style="text-align:center;">No data found.</td></tr>`;
        return;
    }

    tbody.innerHTML = sorted.map(m => `
        <tr>
            <td><div class="member-avatar"><img src="${m.photoURL || clubLogoUrl}" onerror="this.src='${clubLogoUrl}'"> ${m.name}</div></td>
            <td><span class="pbdg">${lang === 'bn' ? (positionTranslation[m.position] || m.position) : m.position}</span></td>
            <td>${m.address || '-'}</td>
            <td>${m.joinDate || m.joinYear || '-'}</td>
        </tr>
    `).join('');
    document.getElementById('mCount').textContent = lang === 'bn' ? `দেখাচ্ছে ${sorted.length} জন` : `Showing ${sorted.length} members`;
}

window.exportToPDF = function() {
    const element = document.querySelector('table');
    const opt = { margin: 0.5, filename: 'ysc_members.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
    html2pdf().set(opt).from(element).save();
    showToastMessage("PDF Download Started!");
};

window.exportToCSV = function() {
    let csv = 'Name,Position,Address,Joined\n';
    allMembers.forEach(m => { csv += `${m.name},${m.position},${m.address},${m.joinDate}\n`; });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'members.csv'; a.click();
    showToastMessage("CSV Download Started!");
};

function showToastMessage(msg) {
    const t = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function filterData() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    const pos = filterEl.value;
    const filtered = allMembers.filter(m => 
        (m.name.toLowerCase().includes(term) || m.address?.toLowerCase().includes(term)) &&
        (pos === 'all' || m.position === pos)
    );
    renderMembers(filtered);
}

document.getElementById('searchInput').addEventListener('input', filterData);
filterEl.addEventListener('change', filterData);

window.setLang = function(lang) {
    document.documentElement.setAttribute('data-lang', lang);
    document.querySelectorAll('[data-en]').forEach(el => {
        el.textContent = el.getAttribute('data-' + lang);
    });
    const l = langData[lang];
    document.getElementById('clubNameHeader').textContent = l.clubNameHeader;
    document.getElementById('developerName').textContent = l.devName;
    setupFilters();
    renderMembers(allMembers);
};

window.addEventListener('load', () => {
    AOS.init();
    loadMembers();
});
</script>
</body>
</html>
